<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Revenda Carro</title>
    <link rel="stylesheet" href="./CSS/estilos.css">
</head>
<body>
    <img src="./img/ex7_3.JPG.jpeg" alt="Herbie" class="normal">
    <h1>Revenda Herbie - Consignados</h1>
    <p>Modelo do Veículo:
        <input type="text" id="inModelo" autofocus>

    <h3 id="outClassif"></h3>
    <h3 id="outPrecoVenda"></h3>
    
    <script src="./JS/herbie.js"></script>
